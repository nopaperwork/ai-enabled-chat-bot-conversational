# =============================================================================
# Voice Bot Application Configuration
# =============================================================================

spring.application.name=voice-bot
server.port=8080

# =============================================================================
# Ollama - Open-source LLM (Spring AI)
# =============================================================================
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=llama3.2
spring.ai.ollama.chat.options.temperature=0.7
spring.ai.ollama.chat.options.num-predict=512

# =============================================================================
# Vosk - Speech-to-Text Configuration
# =============================================================================
# Path to the Vosk model directory (download from https://alphacephei.com/vosk/models)
# Recommended: vosk-model-small-en-us-0.15 (~40MB) for quick start
# Or: vosk-model-en-us-0.22 (~1.8GB) for better accuracy
voicebot.vosk.model-path=vosk-model

# =============================================================================
# Piper TTS - Text-to-Speech Configuration (via openedai-speech)
# =============================================================================
# openedai-speech provides an OpenAI-compatible /v1/audio/speech endpoint
voicebot.tts.base-url=http://localhost:8000
voicebot.tts.voice=alloy
voicebot.tts.model=tts-1
voicebot.tts.response-format=wav
voicebot.tts.speed=1.0

# =============================================================================
# Chat System Prompt & Memory
# =============================================================================
voicebot.chat.system-prompt=You are a helpful voice assistant. Keep your responses \
  concise and conversational since they will be spoken aloud. Avoid using markdown, \
  bullet points, or special formatting. Respond naturally as if having a conversation. \
  You remember everything the user has said in this conversation and can refer back to it.

# Max messages to keep in conversation memory (sliding window per session)
voicebot.chat.memory.max-messages=50

# =============================================================================
# File Upload Configuration
# =============================================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =============================================================================
# Actuator
# =============================================================================
management.endpoints.web.exposure.include=health,info
