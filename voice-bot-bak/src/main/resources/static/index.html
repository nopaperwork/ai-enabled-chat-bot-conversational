<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Bot - AI Voice Assistant</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --recording: #ef4444;
            --recording-glow: rgba(239, 68, 68, 0.4);
            --success: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 { font-size: 1.25rem; font-weight: 600; }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--recording);
        }

        .status-dot.connected { background: var(--success); }

        .container {
            flex: 1;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 80%;
            padding: 0.875rem 1.125rem;
            border-radius: 1rem;
            line-height: 1.5;
            font-size: 0.9375rem;
        }

        .message.user {
            align-self: flex-end;
            background: var(--primary);
            border-bottom-right-radius: 0.25rem;
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--surface);
            border: 1px solid var(--border);
            border-bottom-left-radius: 0.25rem;
        }

        .message .label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .message.user .label { color: rgba(255,255,255,0.7); }

        .message .audio-btn {
            margin-top: 0.5rem;
            background: rgba(255,255,255,0.15);
            border: none;
            color: var(--text);
            padding: 0.375rem 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.8125rem;
        }

        .message .audio-btn:hover { background: rgba(255,255,255,0.25); }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            padding: 1.5rem;
            background: var(--surface);
            border-radius: 1rem;
            border: 1px solid var(--border);
        }

        .mic-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            background: transparent;
            color: var(--primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .mic-btn:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        .mic-btn.recording {
            border-color: var(--recording);
            color: var(--recording);
            animation: pulse 1.5s infinite;
        }

        .mic-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 var(--recording-glow); }
            50% { box-shadow: 0 0 0 15px transparent; }
        }

        .mic-btn svg { width: 32px; height: 32px; fill: currentColor; }

        .controls-label {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .processing {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .text-input-row {
            display: flex;
            gap: 0.5rem;
            width: 100%;
        }

        .text-input-row input {
            flex: 1;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 0.9375rem;
        }

        .text-input-row input::placeholder { color: var(--text-muted); }

        .text-input-row button {
            padding: 0.75rem 1.25rem;
            border-radius: 0.5rem;
            border: none;
            background: var(--primary);
            color: white;
            cursor: pointer;
            font-size: 0.9375rem;
            font-weight: 500;
        }

        .text-input-row button:hover { background: var(--primary-hover); }
        .text-input-row button:disabled { opacity: 0.5; cursor: not-allowed; }

        .mode-toggle {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .mode-toggle button {
            padding: 0.375rem 0.75rem;
            border-radius: 0.375rem;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.8125rem;
        }

        .mode-toggle button.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .welcome {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }

        .welcome h2 { color: var(--text); margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <header>
        <h1>Voice Bot</h1>
        <div style="display: flex; align-items: center; gap: 1rem;">
            <button onclick="newConversation()" style="padding: 0.375rem 0.75rem; border-radius: 0.375rem; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; font-size: 0.8125rem;">New Chat</button>
            <div class="status-badge">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Connecting...</span>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="chat-area" id="chatArea">
            <div class="welcome">
                <h2>AI Voice Assistant</h2>
                <p>Click the microphone to start talking, or type a message below.</p>
            </div>
        </div>

        <div class="controls">
            <div class="mode-toggle">
                <button class="active" id="voiceModeBtn" onclick="setMode('voice')">Voice</button>
                <button id="textModeBtn" onclick="setMode('text')">Text</button>
            </div>

            <div id="voiceControls">
                <button class="mic-btn" id="micBtn" onclick="toggleRecording()">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
                        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>
                <div class="controls-label" id="micLabel">Click to speak</div>
            </div>

            <div id="textControls" style="display: none; width: 100%;">
                <div class="text-input-row">
                    <input type="text" id="textInput" placeholder="Type a message..."
                           onkeydown="if(event.key==='Enter') sendText()">
                    <button onclick="sendText()" id="sendBtn">Send</button>
                </div>
            </div>

            <div class="processing" id="processing" style="display: none;">
                <div class="spinner"></div>
                <span id="processingText">Processing...</span>
            </div>
        </div>
    </div>

    <script>
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let audioContext = null;
        let currentMode = 'voice';
        let ws = null;

        // Generate a persistent session ID for conversation memory
        // Stored in sessionStorage so it persists across page interactions
        // but resets when the browser tab is closed (new conversation)
        const SESSION_ID = sessionStorage.getItem('voicebot-session')
            || (() => { const id = crypto.randomUUID(); sessionStorage.setItem('voicebot-session', id); return id; })();

        // Initialize WebSocket connection
        function connectWebSocket() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}/ws/voice`);

            ws.onopen = () => {
                document.getElementById('statusDot').classList.add('connected');
                document.getElementById('statusText').textContent = 'Connected';
            };

            ws.onclose = () => {
                document.getElementById('statusDot').classList.remove('connected');
                document.getElementById('statusText').textContent = 'Disconnected';
                // Reconnect after 3 seconds
                setTimeout(connectWebSocket, 3000);
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                handleWsMessage(msg);
            };

            ws.onerror = (err) => {
                console.error('WebSocket error:', err);
            };
        }

        function handleWsMessage(msg) {
            switch (msg.type) {
                case 'transcription':
                    if (msg.text) {
                        addMessage('user', msg.text);
                    }
                    break;
                case 'chat_response':
                    // Will be followed by audio_response
                    break;
                case 'audio_response':
                    addMessage('assistant', msg.text, msg.audioBase64);
                    hideProcessing();
                    break;
                case 'error':
                    addMessage('assistant', 'Error: ' + msg.text);
                    hideProcessing();
                    break;
                case 'status':
                    console.log('Status:', msg.text);
                    break;
            }
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('voiceModeBtn').classList.toggle('active', mode === 'voice');
            document.getElementById('textModeBtn').classList.toggle('active', mode === 'text');
            document.getElementById('voiceControls').style.display = mode === 'voice' ? 'block' : 'none';
            document.getElementById('textControls').style.display = mode === 'text' ? 'flex' : 'none';

            if (mode === 'text') {
                document.getElementById('textInput').focus();
            }
        }

        async function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                await startRecording();
            }
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        sampleRate: 16000,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true
                    }
                });

                audioContext = new AudioContext({ sampleRate: 16000 });
                audioChunks = [];

                // Use MediaRecorder to capture WAV-compatible audio
                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
                        ? 'audio/webm;codecs=opus'
                        : 'audio/webm'
                });

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) {
                        audioChunks.push(e.data);
                    }
                };

                mediaRecorder.onstop = () => {
                    stream.getTracks().forEach(t => t.stop());
                    processRecordedAudio();
                };

                mediaRecorder.start(250); // Collect data every 250ms
                isRecording = true;

                const btn = document.getElementById('micBtn');
                btn.classList.add('recording');
                document.getElementById('micLabel').textContent = 'Click to stop';
            } catch (err) {
                console.error('Microphone access denied:', err);
                alert('Microphone access is required for voice input.');
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            isRecording = false;

            const btn = document.getElementById('micBtn');
            btn.classList.remove('recording');
            document.getElementById('micLabel').textContent = 'Click to speak';
        }

        async function processRecordedAudio() {
            showProcessing('Transcribing audio...');

            const blob = new Blob(audioChunks, { type: 'audio/webm' });

            // Convert to WAV using AudioContext for Vosk compatibility
            const arrayBuffer = await blob.arrayBuffer();
            const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
            const wavBlob = audioBufferToWav(audioBuffer);

            // Send via REST API (full pipeline) with session ID for conversation memory
            const formData = new FormData();
            formData.append('audio', wavBlob, 'recording.wav');
            formData.append('sessionId', SESSION_ID);

            try {
                showProcessing('Processing your request...');
                const response = await fetch('/api/voice/converse', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }

                const data = await response.json();

                if (data.transcribedText) {
                    addMessage('user', data.transcribedText);
                }

                if (data.assistantText) {
                    addMessage('assistant', data.assistantText, data.audioBase64);
                }

                // Auto-play the response
                if (data.audioBase64) {
                    playAudioBase64(data.audioBase64);
                }
            } catch (err) {
                console.error('Error:', err);
                addMessage('assistant', 'Sorry, there was an error processing your request.');
            } finally {
                hideProcessing();
            }
        }

        async function sendText() {
            const input = document.getElementById('textInput');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            addMessage('user', text);
            showProcessing('Thinking...');

            try {
                // Get chat response
                const chatResponse = await fetch('/api/voice/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, sessionId: SESSION_ID })
                });

                const chatData = await chatResponse.json();
                const assistantText = chatData.assistantMessage;

                // Get TTS audio
                showProcessing('Generating speech...');
                let audioBase64 = null;
                try {
                    const ttsResponse = await fetch('/api/voice/synthesize', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: assistantText })
                    });

                    if (ttsResponse.ok) {
                        const audioBuffer = await ttsResponse.arrayBuffer();
                        audioBase64 = arrayBufferToBase64(audioBuffer);
                        playAudioBuffer(audioBuffer.slice(0));
                    }
                } catch (ttsErr) {
                    console.warn('TTS unavailable:', ttsErr);
                }

                addMessage('assistant', assistantText, audioBase64);
            } catch (err) {
                console.error('Error:', err);
                addMessage('assistant', 'Sorry, there was an error processing your request.');
            } finally {
                hideProcessing();
            }
        }

        function addMessage(role, text, audioBase64) {
            // Remove welcome message
            const welcome = document.querySelector('.welcome');
            if (welcome) welcome.remove();

            const chatArea = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = `message ${role}`;

            const label = document.createElement('div');
            label.className = 'label';
            label.textContent = role === 'user' ? 'You' : 'Assistant';
            div.appendChild(label);

            const content = document.createElement('div');
            content.textContent = text;
            div.appendChild(content);

            if (audioBase64 && role === 'assistant') {
                const btn = document.createElement('button');
                btn.className = 'audio-btn';
                btn.textContent = 'Replay audio';
                btn.onclick = () => playAudioBase64(audioBase64);
                div.appendChild(btn);
            }

            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function playAudioBase64(base64) {
            const bytes = atob(base64);
            const buffer = new ArrayBuffer(bytes.length);
            const view = new Uint8Array(buffer);
            for (let i = 0; i < bytes.length; i++) {
                view[i] = bytes.charCodeAt(i);
            }
            playAudioBuffer(buffer);
        }

        function playAudioBuffer(buffer) {
            const blob = new Blob([buffer], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            const audio = new Audio(url);
            audio.play().catch(err => console.warn('Audio playback failed:', err));
            audio.onended = () => URL.revokeObjectURL(url);
        }

        function showProcessing(text) {
            document.getElementById('processing').style.display = 'flex';
            document.getElementById('processingText').textContent = text;
            document.getElementById('micBtn').disabled = true;
            document.getElementById('sendBtn').disabled = true;
        }

        function hideProcessing() {
            document.getElementById('processing').style.display = 'none';
            document.getElementById('micBtn').disabled = false;
            document.getElementById('sendBtn').disabled = false;
        }

        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.length; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary);
        }

        // Convert AudioBuffer to WAV Blob
        function audioBufferToWav(buffer) {
            const numChannels = 1;
            const sampleRate = buffer.sampleRate;
            const format = 1; // PCM
            const bitsPerSample = 16;

            // Downmix to mono
            const channelData = buffer.getChannelData(0);
            const samples = new Int16Array(channelData.length);
            for (let i = 0; i < channelData.length; i++) {
                const s = Math.max(-1, Math.min(1, channelData[i]));
                samples[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }

            const dataLength = samples.length * 2;
            const headerLength = 44;
            const totalLength = headerLength + dataLength;

            const arrayBuffer = new ArrayBuffer(totalLength);
            const view = new DataView(arrayBuffer);

            // WAV header
            writeString(view, 0, 'RIFF');
            view.setUint32(4, totalLength - 8, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, format, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * numChannels * bitsPerSample / 8, true);
            view.setUint16(32, numChannels * bitsPerSample / 8, true);
            view.setUint16(34, bitsPerSample, true);
            writeString(view, 36, 'data');
            view.setUint32(40, dataLength, true);

            // Write PCM samples
            const offset = 44;
            for (let i = 0; i < samples.length; i++) {
                view.setInt16(offset + i * 2, samples[i], true);
            }

            return new Blob([arrayBuffer], { type: 'audio/wav' });
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

        // Clear conversation history and start fresh
        async function newConversation() {
            try {
                await fetch(`/api/voice/session/${SESSION_ID}`, { method: 'DELETE' });
            } catch (e) { /* ignore if server unreachable */ }

            // Generate new session ID
            const newId = crypto.randomUUID();
            sessionStorage.setItem('voicebot-session', newId);
            // Reload to reset everything cleanly
            location.reload();
        }

        // Initialize
        connectWebSocket();
    </script>
</body>
</html>
